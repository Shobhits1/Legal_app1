<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - NyayaMitra</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; padding: 20px 0; }
        .signup-card { max-width: 500px; margin: 0 auto; box-shadow: 0 10px 40px rgba(0,0,0,0.3); border-radius: 15px; }
        .btn-google { background: white; color: #333; border: 1px solid #ddd; }
        .btn-google:hover { background: #f8f9fa; }
    </style>
</head>
<body>
    <div class="container">
        <div class="signup-card card">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <h2 class="mb-2">⚖️ Create Account</h2>
                    <p class="text-muted">Join NyayaMitra Today</p>
                </div>
                
                <div id="alert" class="alert d-none"></div>
                
                <form id="signupForm">
                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" class="form-control" id="full_name" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password (min 8 characters)</label>
                        <input type="password" class="form-control" id="password" required minlength="8">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Confirm Password</label>
                        <input type="password" class="form-control" id="confirm_password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 mb-3">
                        <i class="fas fa-user-plus me-2"></i>Create Account
                    </button>
                </form>
                
                <div class="text-center mb-3">
                    <p class="text-muted mb-2">Or sign up with</p>
                    <a href="/api/auth/google" class="btn btn-google w-100">
                        <i class="fab fa-google me-2"></i>Continue with Google
                    </a>
                </div>
                
                <div class="text-center">
                    <p class="mb-0">Already have an account? <a href="/login">Login</a></p>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const full_name = document.getElementById('full_name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirm_password = document.getElementById('confirm_password').value;
            const alert = document.getElementById('alert');
            
            if (password !== confirm_password) {
                alert.className = 'alert alert-danger';
                alert.textContent = 'Passwords do not match';
                alert.classList.remove('d-none');
                return;
            }
            
            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, full_name })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('access_token', data.access_token);
                    localStorage.setItem('refresh_token', data.refresh_token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    alert.className = 'alert alert-success';
                    alert.textContent = 'Account created successfully! Redirecting...';
                    alert.classList.remove('d-none');
                    setTimeout(() => window.location.href = '/', 1500);
                } else {
                    alert.className = 'alert alert-danger';
                    alert.textContent = data.error || 'Registration failed';
                    alert.classList.remove('d-none');
                }
            } catch (error) {
                alert.className = 'alert alert-danger';
                alert.textContent = 'Network error. Please try again.';
                alert.classList.remove('d-none');
            }
        });
    </script>
</body>
</html>
